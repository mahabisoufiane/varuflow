<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Varuflow — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a2332;
    }
    .card {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      max-width: 360px;
      width: 90%;
    }
    .icon {
      width: 56px;
      height: 56px;
      background: #f3f4f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.5; }
    button {
      margin-top: 24px;
      padding: 10px 24px;
      background: #1a2332;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2a3342; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>You're offline</h1>
    <p>Varuflow needs an internet connection to load. Check your network and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
