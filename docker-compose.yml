services:
  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: varuflow
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Supabase (local auth) ──────────────────────────────────────────────────
  supabase:
    image: supabase/gotrue:v2.143.0
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/varuflow?search_path=auth"
      GOTRUE_SITE_URL: "http://localhost:9990"
      GOTRUE_URI_ALLOW_LIST: "http://localhost:9990,http://localhost:3000"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: "http://localhost:9999"
    ports:
      - "9999:9999"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 9991 --reload
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "9991:9991"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/varuflow
      CORS_ORIGINS: "http://localhost:9990"
      SUPABASE_URL: http://supabase:9999
      SUPABASE_SERVICE_KEY: ""
      SUPABASE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      ENV: development
      DEBUG: "true"
      PORTAL_JWT_SECRET: "portal-secret-change-in-production-32chars"
      PORTAL_BASE_URL: "http://localhost:9990"
      # ── Standalone local auth ──────────────────────────────────────────────
      # Replace with: python -c "import secrets; print(secrets.token_hex(32))"
      AUTH_JWT_SECRET: "dev-local-auth-jwt-secret-change-in-production-64chars"
      SMTP_HOST: ""          # blank → emails printed to stdout in dev
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "noreply@varuflow.se"
    depends_on:
      postgres:
        condition: service_healthy

    # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: npm run dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    working_dir: /app
    ports:
      - "9990:9990"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:9991
      NEXT_PUBLIC_SUPABASE_URL: https://tmizvegzdlwpqceavvwh.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: sb_publishable_R9YSA5I3KRsLqXifnuGRAQ_J9YMEywy
    depends_on:
      - backend

  # ── n8n (automation engine) ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=varuflow
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
      - N8N_ENCRYPTION_KEY=your-very-long-secret-32-characters
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=your-n8n-password
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
    ports:
      - "5678:5678"
    depends_on:
      - postgres
      - redis
    volumes:
      - n8n_data:/home/node/.n8n

  # ── Redis (for n8n queue mode) ─────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: unless-stopped

volumes:
  pgdata:
  frontend_node_modules:
  frontend_next:
  n8n_data: